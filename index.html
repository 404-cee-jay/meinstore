<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header blend">
    <div class="header__desktop">
        <nav class="links-container">
            <a href="#" class="link-active-full">COLLECTIONS</a>
            <a href="#" class="link-active-full">MANIFESTO</a>
        </nav>
    </div>

    <div class="header-logo-container">
        <h1 class="logo-text">MEIN</h1>
    </div>

    <div class="header__desktop right">
        <a href="#" class="header-cart link-active-full">
            CART (0)
        </a>
    </div>
</header>

<div class="product__wrapper">
    <div class="product-link">
        <img src="product-front.jpg" class="image-preview" alt="The Fallen Tee">
        <img src="product-hover.jpg" class="image-preview-hover" alt="Hover View">
    </div>

    <div class="info-box__wrapper">
        <div class="info__wrapper">
            <h3 class="text-main">THE FALLEN TEE</h3>
            <p class="price">$85.00</p>
        </div>

        <div class="squared-line" style="margin: 1rem 0;">
            <span class="square"></span>
            <span class="line"></span>
            <span class="square"></span>
        </div>

        <div class="variant-list__wrapper">
            <span class="size-label">S</span>
            <span class="size-label">M</span>
            <span class="size-label">L</span>
            <span class="size-label empty">XL</span>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
